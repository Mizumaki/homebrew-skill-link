name: CI

on:
  push:
    branches:
      - main
      - 'release/**'
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck
        run: shellcheck bin/skill-link

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install bats (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y bats
      - name: Install bats (macOS)
        if: runner.os == 'macOS'
        run: brew install bats-core
      - name: Run bats tests
        run: bats tests/

  formula:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint Formula style
        run: brew style Formula/skill-link.rb
